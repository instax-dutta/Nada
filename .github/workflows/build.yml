name: Build and Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  #############################################################################
  # macOS (Active)
  #############################################################################
  macos:
    runs-on: macos-14
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install cmake ninja qt@6 taglib libsoxr fftw spdlog nlohmann-json pkg-config

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)"

      - name: Build
        run: cmake --build build --target nada

      - name: Run tests
        run: |
          cmake --build build --target nada_tests
          ./build/tests/nada_tests

      - name: Package .app bundle
        run: |
          cd build
          zip -r ../Nada-macOS-${{ github.sha }}.zip nada.app

      - uses: actions/upload-artifact@v4
        with:
          name: Nada-macOS
          path: Nada-macOS-${{ github.sha }}.zip

