<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- two crossing arrows = shuffle -->
  <!-- top arrow: left→bottom-right -->
  <polyline points="3,7 8,7 21,17 21,17" fill="none" stroke="#e8e8e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="18,14 21,17 18,20" fill="none" stroke="#e8e8e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- bottom arrow: left→top-right -->
  <polyline points="3,17 8,17 21,7" fill="none" stroke="#e8e8e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="18,4 21,7 18,10" fill="none" stroke="#e8e8e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
